<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Ekasi - Alumni Wall</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--orange:#f7931a;--orange-glow:rgba(247,147,26,0.15);--bg:#0d0d0d;--bg2:#141414;--bg3:#1a1a1a;--border:#2a2a2a;--text:#f0f0f0;--text2:#a0a0a0;--text3:#666666;--gold:#ffd700;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(247,147,26,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(247,147,26,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* Header */
.hero{text-align:center;padding:60px 20px 40px;position:relative;z-index:1}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:var(--orange-glow);border:1px solid rgba(247,147,26,0.3);border-radius:100px;padding:6px 16px;font-size:11px;font-weight:600;color:var(--orange);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px}
.hero h1{font-size:clamp(40px,10vw,80px);font-weight:800;line-height:0.95;margin-bottom:16px}
.hero h1 span{color:var(--orange);display:block}
.hero p{font-size:14px;color:var(--text2);font-family:'DM Mono',monospace;letter-spacing:1px;margin-bottom:40px}
.hero-line{width:80px;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);margin:0 auto}

/* Stats strip */
.stats-strip{display:flex;justify-content:center;gap:40px;padding:32px 20px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:48px;position:relative;z-index:1;flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:40px;font-weight:800;color:var(--orange);font-family:'DM Mono',monospace;line-height:1}
.stat-label{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-top:6px;font-weight:600}

/* Grid */
.container{max-width:1100px;margin:0 auto;padding:0 20px 80px;position:relative;z-index:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}

/* Alumni Card */
.alumni-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color 0.3s,transform 0.2s;position:relative}
.alumni-card:hover{border-color:rgba(247,147,26,0.3);transform:translateY(-2px)}
.alumni-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--orange),transparent)}
.card-top{padding:24px 20px 16px;display:flex;align-items:center;gap:16px}
.avatar{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--gold));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;flex-shrink:0;position:relative}
.avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--orange));z-index:-1}
.grad-icon{position:absolute;bottom:-4px;right:-4px;font-size:16px}
.card-info h3{font-size:16px;font-weight:700;margin-bottom:4px}
.card-info .grad-date{font-size:11px;color:var(--orange);font-family:'DM Mono',monospace;letter-spacing:1px}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.card-stat{background:var(--bg2);padding:14px 16px;text-align:center}
.card-stat-val{font-size:20px;font-weight:800;color:var(--orange);font-family:'DM Mono',monospace;line-height:1}
.card-stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px;font-weight:600}
.card-bottom{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-class{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.card-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.2);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px}

/* Empty */
.empty{text-align:center;padding:80px 20px;color:var(--text3)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-title{font-size:18px;font-weight:700;color:var(--text2);margin-bottom:8px}
.empty-sub{font-size:13px;font-family:'DM Mono',monospace;letter-spacing:1px}

/* Loading */
.loading{text-align:center;padding:80px 20px}
.loader{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:2px}

/* Footer */
footer{text-align:center;padding:32px 20px;border-top:1px solid var(--border);position:relative;z-index:1}
footer p{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;letter-spacing:1px;line-height:2}
footer span{color:var(--orange)}

@media(max-width:600px){
  .stats-strip{gap:24px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">Hall of Fame</div>
  <h1>Bitcoin Ekasi<span>Alumni Wall</span></h1>
  <p>Students who completed the Bitcoin Diploma Program</p>
  <div class="hero-line"></div>
</div>

<div class="stats-strip">
  <div class="stat"><div class="stat-num" id="totalGrads">-</div><div class="stat-label">Graduates</div></div>
  <div class="stat"><div class="stat-num" id="totalDays">-</div><div class="stat-label">Total Days Attended</div></div>
  <div class="stat"><div class="stat-num" id="totalSats">-</div><div class="stat-label">Total Sats Earned</div></div>
</div>

<div class="container">
  <div id="alumniGrid" class="grid">
    <div class="loading">
      <div class="loader"></div>
      <div class="loading-text">Loading graduates...</div>
    </div>
  </div>
</div>

<footer>
  <p>Bitcoin Ekasi &nbsp;&middot;&nbsp; Mossel Bay, South Africa<br>
  <span>Teaching Bitcoin by using Bitcoin</span><br>
  Powered by Lightning Network</p>
</footer>

<script>
const SUPABASE_URL = "https://bnteowvyioptlvohyert.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJudGVvd3Z5aW9wdGx2b2h5ZXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTg2NTUsImV4cCI6MjA5NTYzNDY1NX0._-PZgmwe7CGi9aDeoOh_LsauaRru6LGgxxVZj9pv0MY";
const SATS = 500;

async function sb(table, params) {
  params = params || "";
  var res = await fetch(SUPABASE_URL + "/rest/v1/" + table + params, {
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
  });
  var text = await res.text();
  try { return JSON.parse(text); } catch(e) { return []; }
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  var d = new Date(dateStr);
  var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return months[d.getMonth()] + " " + d.getFullYear();
}

async function loadAlumni() {
  var students = await sb("students", "?graduated=eq.true&order=graduated_at.asc");
  var grid = document.getElementById("alumniGrid");

  if (!students || !students.length) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">&#127891;</div><div class="empty-title">No graduates yet</div><div class="empty-sub">The first graduates will appear here soon</div></div>';
    document.getElementById("totalGrads").textContent = "0";
    document.getElementById("totalDays").textContent = "0";
    document.getElementById("totalSats").textContent = "0";
    return;
  }

  var ids = students.map(function(s) { return s.id; }).join(",");
  var attRaw = await sb("attendance", "?student_id=in.(" + ids + ")");

  var totalDays = 0;
  var totalSats = 0;

  var html = "";
  students.forEach(function(s) {
    var days = (attRaw || []).filter(function(a) { return a.student_id === s.id; }).length;
    var earned = days * SATS;
    totalDays += days;
    totalSats += earned;
    var initials = s.name.split("-").pop().trim().charAt(0).toUpperCase();
    html += '<div class="alumni-card">';
    html += '<div class="card-top">';
    html += '<div class="avatar">' + initials + '<span class="grad-icon">&#127891;</span></div>';
    html += '<div class="card-info"><h3>' + s.name + '</h3>';
    html += '<div class="grad-date">Graduated ' + formatDate(s.graduated_at) + '</div></div></div>';
    html += '<div class="card-stats">';
    html += '<div class="card-stat"><div class="card-stat-val">' + days + '</div><div class="card-stat-label">Days Attended</div></div>';
    html += '<div class="card-stat"><div class="card-stat-val">' + earned.toLocaleString() + '</div><div class="card-stat-label">Sats Earned</div></div>';
    html += '</div>';
    html += '<div class="card-bottom"><div class="card-class">Bitcoin Diploma &middot; Mossel Bay</div>';
    html += '<div class="card-badge">Graduate</div></div>';
    html += '</div>';
  });

  grid.innerHTML = html;
  document.getElementById("totalGrads").textContent = students.length;
  document.getElementById("totalDays").textContent = totalDays.toLocaleString();
  document.getElementById("totalSats").textContent = totalSats.toLocaleString();
}

loadAlumni();
</script>
</body>
</html>
